                                  <select 
                                      className="w-full h-full text-[0.7rem] bg-transparent outline-none cursor-pointer text-gray-800"
                                      onChange={(e) => onUpdatePlayer(match.id, slotKey, e.target.value)}
                                      onClick={(e) => e.stopPropagation()} // Prevent accidental win selection
                                      value={playerId || ""}
                                  >
                                      <option value="">-- Empty Slot --</option>
                                      {playerId && <option value={playerId} className="font-bold">{nameOf(playerId)}</option>}
                                      <optgroup label="Available Players">
                                          {availableStudents.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                      </optgroup>
                                  </select>
                                  {isActive && playerId && (
                                    <button 
                                        className="bg-green-100 text-green-700 hover:bg-green-200 h-full px-2 border-l border-green-200 flex-shrink-0 font-bold text-xs transition"
                                        onClick={(e) => { e.stopPropagation(); onSetWinner(match.id, playerId); }}
                                        title="Declare Winner"
                                    >✓</button>
                                  )}
                              </div>
                          ) : playerId ? (
                              <div className="player flex justify-between items-center w-full">
                                  <span className="truncate">
                                      {seed && <span className="text-xs text-gray-500 mr-1 font-normal">#{seed}</span>}
                                      {nameOf(playerId)}
                                  </span>
                              </div>
                          ) : (
                              <div className="player text-gray-400 italic">TBD</div>
                          )}
                      </div>
                  </div>
              );
          }

          return (
              <div className="bracket-wrapper">
                  <div className="bracket-headers">
                      {leftCols.map((c, i) => <div key={`lh-${i}`} className="h-col">{c.label}</div>)}
                      <div className="h-col center">Championship Round</div>
                      {rightCols.map((c, i) => <div key={`rh-${i}`} className="h-col">{c.label}</div>)}
                  </div>

                  <div className="bracket-body relative mt-6">
                      <div className="region-watermark wm-nocap">No Cap</div>
                      <div className="region-watermark wm-aura">Aura</div>
                      <div className="region-watermark wm-vibe">Vibe Check</div>
                      <div className="region-watermark wm-goated">Goated</div>

                      {leftCols.map((col, cIdx) => (
                          <div key={`lcol-${cIdx}`} className={`column left-side ${cIdx === leftCols.length - 1 ? 'no-lines' : ''}`}>
                              {col.matches.map((m, mIdx) => (
                                  <div key={m.id} className="matchup">
                                      {renderSlot(m, m.p1Id, m.winnerId === m.p1Id, 'p1Id', col.roundIdx)}
                                      {renderSlot(m, m.p2Id, m.winnerId === m.p2Id, 'p2Id', col.roundIdx)}
                                  </div>
                              ))}
                          </div>
                      ))}

                      <div className="column center-col">
                          {finalMatch && (
                            <div className="center-area mt-16">
                                <div className="championship-row">
                                    {renderSlot(finalMatch, finalMatch.p1Id, finalMatch.winnerId === finalMatch.p1Id, 'p1Id', numRounds - 1)}
                                    <div className="vs-text">VS</div>
                                    {renderSlot(finalMatch, finalMatch.p2Id, finalMatch.winnerId === finalMatch.p2Id, 'p2Id', numRounds - 1)}
                                </div>
                                <div className="champion-connector-horizontal"></div>
                                <div className="champion-connector-vertical"></div>
                                <div className="champion-slot-wrapper">
                                    <div className="slot">
                                        {championId ? (tournament.championName || nameOf(championId)) : ""}
                                    </div>
                                    <div className="champ-label">🏆 Championship Belt Winner 🏆</div>
                                </div>
                            </div>
                          )}
                      </div>

                      {rightCols.map((col, cIdx) => (
                          <div key={`rcol-${cIdx}`} className={`column right-side ${cIdx === 0 ? 'no-lines' : ''}`}>
                              {col.matches.map((m, mIdx) => (
                                  <div key={m.id} className="matchup">
                                      {renderSlot(m, m.p1Id, m.winnerId === m.p1Id, 'p1Id', col.roundIdx)}
                                      {renderSlot(m, m.p2Id, m.winnerId === m.p2Id, 'p2Id', col.roundIdx)}
                                  </div>
                              ))}
                          </div>
                      ))}
                  </div>
              </div>
          );
      }


      // ------------------------------------ Tournament Logic ------------------------------------

      function propagateWinners(bracket) {
        const b = structuredClone(bracket);
        for (let r = 0; r < b.rounds.length - 1; r++) {
          const cur = b.rounds[r].matches;
          const nxt = b.rounds[r + 1].matches;
          for (let i = 0; i < nxt.length; i++) {
            const a = cur[2 * i];
            const c = cur[2 * i + 1];
            nxt[i].p1Id = a ? (a.winnerId || null) : null;
            nxt[i].p2Id = c ? (c.winnerId || null) : null;

            if (nxt[i].winnerId && nxt[i].winnerId !== nxt[i].p1Id && nxt[i].winnerId !== nxt[i].p2Id) {
              nxt[i].winnerId = null;
              nxt[i].award = null;
            }

            if (!nxt[i].p1Id && !nxt[i].p2Id) {
              nxt[i].winnerId = null;
            }
          }
        }
        return b;
      }

      function extractGoldStands(bracket) {
        if (!bracket?.rounds || bracket.rounds.length < 2) return [];
        const semi = bracket.rounds[bracket.rounds.length - 2];
        const ids = semi.matches.flatMap((m) => [m.p1Id, m.p2Id]).filter(Boolean);
        return Array.from(new Set(ids));
      }

      function buildRegionalBracket(test, students, instrumentFilter, size) {
          const pool = instrumentFilter
            ? students.filter(s => s.instrument === instrumentFilter)
            : students;

          const entries = Object.entries(test?.scores || {})
            .filter(([, sc]) => sc !== null && sc !== "" && Number(sc) >= 8.5)
            .map(([studentId, sc]) => ({ studentId, score: Number(sc), instrument: students.find(s=>s.id===studentId)?.instrument }))
            .filter(e => pool.some(s => s.id === e.studentId))
            .sort((a, b) => b.score - a.score);

          const instGroups = {};
          entries.forEach(e => {
              if (!instGroups[e.instrument]) instGroups[e.instrument] = [];
              instGroups[e.instrument].push(e);
          });

          const regions = [[], [], [], []];
          const keys = Object.keys(instGroups).sort((a,b) => instGroups[b].length - instGroups[a].length);

          keys.forEach(k => {
              instGroups[k].forEach(e => {
                  let min = 999;
                  let minIdx = 0;
                  for(let i=0; i<4; i++) {
                     if (regions[i].length < min) { min = regions[i].length; minIdx = i; }
                  }
                  regions[minIdx].push(e);
              });
          });

          regions.forEach(r => r.sort((a,b) => b.score - a.score));

          const target = size / 4;
          regions.forEach(r => {
              while(r.length < target) r.push(null);
          });

          function getPairs(reg) {
              const matches = [];
              const pairs = seededSlotOrder(target);
              for(let i=0; i<pairs.length; i+=2) {
                  const p1 = reg[pairs[i]-1]?.studentId || null;
                  const p2 = reg[pairs[i+1]-1]?.studentId || null;
                  matches.push({ id: uid(), p1Id: p1, p2Id: p2, winnerId: null, award: null });
              }
              return matches;
          }

          const round1 = [ ...getPairs(regions[0]), ...getPairs(regions[1]), ...getPairs(regions[2]), ...getPairs(regions[3]) ];
          const rounds = [{ name: roundLabel(size), matches: round1 }];

          let participants = size / 2;
          while (participants >= 2) {
            if (participants === 1) break;
            const matchCount = participants / 2;
            const matches = Array.from({ length: matchCount }, () => ({
              id: uid(), p1Id: null, p2Id: null, winnerId: null, award: null,
            }));
            rounds.push({ name: roundLabel(participants), matches });
            participants = participants / 2;
          }

          const bracket = { size, rounds };
          const finalBracket = propagateWinners(bracket);

          const seedsById = {};
          entries.forEach((e, idx) => seedsById[e.studentId] = idx + 1);

          return { bracket: finalBracket, seedsById };
      }

      function Tournaments({ state, setState, isAdmin }) {
        const [selectedTestId, setSelectedTestId] = useState("");
        const [selectedInstrument, setSelectedInstrument] = useState("");
        const [size, setSize] = useState(64);
        const [date, setDate] = useState(todayISO());
        const [name, setName] = useState("Band Madness");
        const [fullscreenTournamentId, setFullscreenTournamentId] = useState(null);
        
        const audioRef = useRef({});

        useEffect(() => {
          const make = (src) => {
            const a = new Audio(src);
            a.preload = "auto";
            a.volume = clamp(Number(state.settings?.volume ?? 0.7), 0, 1);
            return a;
          };
          audioRef.current = {
            tournamentStart: make(SOUND_FILES.tournamentStart),
            betweenRoundsA: make(SOUND_FILES.betweenRoundsA),
            betweenRoundsB: make(SOUND_FILES.betweenRoundsB),
            victory: make(SOUND_FILES.victory),
            deepRun: make(SOUND_FILES.deepRun),
          };
        }, []);

        function playSound(key) {
          if (!state.settings?.soundEnabled) return;
          const a = audioRef.current?.[key];
          if (!a) return;
          try { a.currentTime = 0; a.play(); } catch (_) {}
        }

        const tests = useMemo(() => {
          return [...(state.chairTests || [])].filter(t => !t.isArchived).sort((a, b) => (b.date || "").localeCompare(a.date || ""));
        }, [state.chairTests]);

        useEffect(() => {
          if (!selectedTestId && tests.length) setSelectedTestId(tests[0].id);
        }, [tests]);

        function createTournament() {
          const test = (state.chairTests || []).find((t) => t.id === selectedTestId);
          if (!test) {
            alert("Select a Chair Test to seed from.");
            return;
          }
          
          const { bracket, seedsById } = buildRegionalBracket(test, state.students, selectedInstrument, size);

          const t = {
            id: uid(),
            date,
            name: name?.trim() || "Band Madness",
            testId: test.id,
            instrument: selectedInstrument || "All",
            size: clamp(Number(size || 64), 8, 64),
            seedsById,
            bracket,
            championId: null,
            championName: null, 
            goldStands: extractGoldStands(bracket),
            isArchived: false
          };

          setState((prev) => ({ ...prev, tournaments: [t, ...(prev.tournaments || [])] }));
          playSound("tournamentStart");
        }

        function archiveTournament(tournamentId) {
            if(!confirm("Send to Archives? You can restore it later.")) return;
            setState(prev => ({
                ...prev,
                tournaments: prev.tournaments.map(t => t.id === tournamentId ? { ...t, isArchived: true } : t)
            }));
        }

        function deleteTournament(tournamentId) {
            if(!confirm("Permanently delete this bracket? This cannot be undone.")) return;
            setState(prev => ({
                ...prev,
                tournaments: prev.tournaments.filter(t => t.id !== tournamentId)
            }));
        }

        function reseedTournament(tournamentId) {
            if (!confirm("Are you sure you want to reseed? This will completely wipe this bracket's progress and re-pull the 8.5+ scores from the Chair Test.")) return;
            setState((prev) => {
                const t = prev.tournaments.find((x) => x.id === tournamentId);
                const test = prev.chairTests.find((x) => x.id === t.testId);
                if (!test) return prev;
                const { bracket, seedsById } = buildRegionalBracket(test, prev.students, t.instrument === "All" ? "" : t.instrument, t.size);
                return {
                    ...prev,
                    tournaments: prev.tournaments.map((x) => 
                        x.id === tournamentId ? { ...x, bracket, seedsById, championId: null, championName: null, goldStands: [] } : x
                    )
                };
            });
        }

        function updateMatchPlayer(tournamentId, matchId, slotKey, newPlayerId) {
            setState((prev) => {
                const t = prev.tournaments.find((x) => x.id === tournamentId);
                if (!t) return prev;
                const b = structuredClone(t.bracket);
                const match = b.rounds[0].matches.find((m) => m.id === matchId);
                
                if (match) {
                    const oldPlayerId = match[slotKey];
                    match[slotKey] = newPlayerId || null;

                    // If replacing an existing player, cascade the change to future rounds
                    if (oldPlayerId && newPlayerId) {
                        for (let r = 0; r < b.rounds.length; r++) {
                            b.rounds[r].matches.forEach(m => {
                                if (m.p1Id === oldPlayerId) m.p1Id = newPlayerId;
                                if (m.p2Id === oldPlayerId) m.p2Id = newPlayerId;
                                if (m.winnerId === oldPlayerId) {
                                    m.winnerId = newPlayerId;
                                    if (m.award && m.award.winnerId === oldPlayerId) m.award.winnerId = newPlayerId;
                                }
                            });
                        }
                        // Swap seeds
                        t.seedsById[newPlayerId] = t.seedsById[oldPlayerId];
                        delete t.seedsById[oldPlayerId];
                    } 
                    // Handle complete removal of player
                    else if (oldPlayerId && !newPlayerId) {
                         for (let r = 0; r < b.rounds.length; r++) {
                            b.rounds[r].matches.forEach(m => {
                                if (m.p1Id === oldPlayerId) m.p1Id = null;
                                if (m.p2Id === oldPlayerId) m.p2Id = null;
                                if (m.winnerId === oldPlayerId) m.winnerId = null;
                            });
                        }
                    }
                }
                
                const newB = propagateWinners(b);
                
                // Also update Champion if it was the old player
                let newChampId = t.championId;
                const finalMatch = newB.rounds[newB.rounds.length - 1].matches[0];
                if (finalMatch.winnerId) newChampId = finalMatch.winnerId;
                else newChampId = null;

                const newChampName = newChampId ? prev.students.find(s => s.id === newChampId)?.name : null;

                const updatedTournament = { ...t, bracket: newB, goldStands: extractGoldStands(newB), championId: newChampId, championName: newChampName };
                return {
                    ...prev,
                    tournaments: prev.tournaments.map((x) => x.id === tournamentId ? updatedTournament : x)
                };
            });
        }

        function awardForMatch(tournament, bracket, roundIndex, winnerId, loserId) {
            let bonus = 0;

            // Upset bonus
            const wSeed = tournament.seedsById?.[winnerId] ?? null;
            const lSeed = tournament.seedsById?.[loserId] ?? null;
            if (wSeed && lSeed && wSeed > lSeed) {
               bonus += (wSeed - lSeed) * 2; // Default underdog logic
            }

            // Progression logic
            const numRounds = bracket.rounds.length;
            const isFinalRound = roundIndex === numRounds - 1;
            const nextRound = bracket.rounds[roundIndex + 1];

            // Base for ANY win is 10
            let base = 10;

            if (isFinalRound) {
                // Champion! (+100)
                base += 100;
            } else if (nextRound) {
                if (nextRound.name === "Elite Eight") base += 8;
                if (nextRound.name === "The Final Four") base += 40;
                if (nextRound.name === "Championship Round") base += 50;
            }

            return base + bonus;
        }

        function roundIsComplete(bracket, roundIndex) {
          const round = bracket?.rounds?.[roundIndex];
          if (!round) return false;
          return round.matches.every((m) => {
            if (!m.p1Id && !m.p2Id) return true;
            if (m.p1Id && !m.p2Id) return !!m.winnerId; 
            if (!m.p1Id && m.p2Id) return !!m.winnerId; 
            return !!m.winnerId;
          });
        }

        function setWinner(tournamentId, matchId, winnerId) {
          setState((prev) => {
            const t = (prev.tournaments || []).find((x) => x.id === tournamentId);
            if (!t) return prev;

            const before = t.bracket;
            const b = structuredClone(before);

            let roundIndex = -1;
            let match = null;

            for (let r = 0; r < b.rounds.length; r++) {
              const round = b.rounds[r];
              const found = round.matches.find((m) => m.id === matchId);
              if (found) {
                roundIndex = r;
                match = found;
                break;
              }
            }
            if (!match) return prev;
            if (match.winnerId === winnerId) return prev; 

            const oldWinner = match.winnerId || null;
            const oldAward = (match.award && match.award.winnerId === oldWinner) ? Number(match.award.amount || 0) : 0;

            let students = prev.students || [];
            if (oldWinner && oldAward > 0) {
              students = students.map((s) => (s.id === old
